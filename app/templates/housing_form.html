{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div class="page-header">
        <h2><i class="bi bi-pencil-square me-2 text-primary"></i>Редактировать корпус</h2>
    </div>
    <a href="{{ url_for('catalog.housings') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Назад
    </a>
</div>
<div class="card" style="max-width:400px">
    <div class="card-body p-4">
        <form method="POST">
            {{ form.hidden_tag() }}
            <div class="mb-3">
                {{ form.housing_name.label(class="form-label") }}
                {{ form.housing_name(class="form-control") }}
            </div>
            {{ form.submit(class="btn btn-primary") }}
        </form>
    </div>
</div>
{% endblock %}
