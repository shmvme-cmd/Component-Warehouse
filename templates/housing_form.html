{% extends "base.html" %}
{% block content %}
<div class="card">
    <div class="card-body">
        <h2>Редактировать корпус</h2>
        <form method="POST">
            {{ form.hidden_tag() }}
            <div class="mb-3">
                {{ form.housing_name.label(class="form-label") }}
                {{ form.housing_name(class="form-control") }}
            </div>
            {{ form.submit(class="btn btn-primary") }}
        </form>
    </div>
</div>
{% endblock %}
